<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM 工具目錄</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --green: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 2rem; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 40px; }

  .section { margin-bottom: 36px; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    border-left: 4px solid var(--accent);
    padding-left: 12px;
    margin-bottom: 14px;
    letter-spacing: .04em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .2s, transform .2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .icon { font-size: 1.4rem; flex-shrink: 0; }
  .card-name { font-size: 0.95rem; font-weight: 500; }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    background: rgba(16,185,129,0.15);
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 1px 6px;
    margin-top: 3px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🗂️ BIM 工具目錄</h1>
  <p class="subtitle">Dynamo 腳本 · 確認版 (FT-)</p>

  <div class="section">
    <div class="section-title">📋 匯入 / 匯出</div>
    <div class="grid">
      <div class="card"><span class="icon">📥</span><div><div class="card-name">Excel 匯入［柱樑板牆］</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📥</span><div><div class="card-name">Excel 匯入 加強版</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📤</span><div><div class="card-name">匯出 NWC</div><span class="badge">確認版</span></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📐 自動標註</div>
    <div class="grid">
      <div class="card"><span class="icon">📏</span><div><div class="card-name">標註［網格］平面</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📏</span><div><div class="card-name">標註［網格］立面</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📏</span><div><div class="card-name">標註［柱］平面／立面</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📏</span><div><div class="card-name">標註［樑］平面／立面</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📏</span><div><div class="card-name">標註［牆］平面／立面</div><span class="badge">確認版</span></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔗 CAD 相關</div>
    <div class="grid">
      <div class="card"><span class="icon">🔄</span><div><div class="card-name">CAD 線型讀取轉換</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">📤</span><div><div class="card-name">匯出牆與 RVT 相同</div><span class="badge">確認版</span></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🛠️ 其他工具</div>
    <div class="grid">
      <div class="card"><span class="icon">🗑️</span><div><div class="card-name">刪除圖紙及元件</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">🔲</span><div><div class="card-name">建立網格</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">🔗</span><div><div class="card-name">批量連結</div><span class="badge">確認版</span></div></div>
      <div class="card"><span class="icon">🎨</span><div><div class="card-name">選取調色</div><span class="badge">確認版</span></div></div>
    </div>
  </div>

</div>
</body>
</html>
